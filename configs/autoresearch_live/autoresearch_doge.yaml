# Autoresearch live adapter — DOGE mainnet ($300 account, 3x leverage, 4 coins)
# equity = $300 * 3x / 4 = $225 (leverage-adjusted per-coin equity)
# Run: hl run --config configs/autoresearch_live/autoresearch_doge.yaml --mainnet
strategy: autoresearch
instrument: DOGE-PERP
tick_interval: 15.0
mainnet: true
data_dir: data/autoresearch/doge

strategy_params:
  instrument: DOGE
  equity: 230.0  # $307 * 3x / 4 coins = actual per-coin budget

max_position_qty: 1200    # ~$225 at ~$0.19
max_notional_usd: 250
max_order_size: 1200
max_daily_drawdown_pct: 5.0
max_leverage: 3.0
tvl: 75.0

