# Autoresearch $1K strategy — ETH mainnet (5 coins, 5x leverage)
# equity = $1000 / 5 coins = $200 per coin
strategy: autoresearch
instrument: ETH-PERP
tick_interval: 15.0
mainnet: true
data_dir: data/autoresearch-2k/eth

strategy_params:
  instrument: ETH
  equity: 200.0

max_position_qty: 0.1     # ~$200 at ~$2000 ETH
max_notional_usd: 250
max_order_size: 0.1
max_daily_drawdown_pct: 5.0
max_leverage: 5.0
tvl: 200.0
