# Autoresearch $1K strategy — BTC mainnet (5 coins, 5x leverage)
# equity = $1000 / 5 coins = $200 per coin
strategy: autoresearch
instrument: BTC-PERP
tick_interval: 15.0
mainnet: true
data_dir: data/autoresearch-2k/btc

strategy_params:
  instrument: BTC
  equity: 200.0

max_position_qty: 0.002   # ~$170 at ~$85k BTC
max_notional_usd: 250
max_order_size: 0.002
max_daily_drawdown_pct: 5.0
max_leverage: 5.0
tvl: 200.0
