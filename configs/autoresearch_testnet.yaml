# Autoresearch live adapter — testnet config
# Wraps auto-researchtrading/strategy.py (always latest champion)
# Run: hl run --config configs/autoresearch_testnet.yaml
strategy: autoresearch
instrument: BTC-PERP
tick_interval: 10.0
dry_run: false
max_ticks: 0
data_dir: data/autoresearch

strategy_params:
  equity: 300.0  # matches tvl below

# Risk limits
max_position_qty: 0.005   # ~$435 max BTC position
max_notional_usd: 500
max_order_size: 0.005
max_daily_drawdown_pct: 15.0
max_leverage: 5.0
tvl: 300.0
