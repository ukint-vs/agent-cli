# Native 5m strategy — LINK mainnet ($1K, 3 coins, 10x leverage)
# equity = $333/coin, position = $75-$180 (vote-scaled)
strategy: autoresearch_5m
instrument: LINK-PERP
tick_interval: 15.0
mainnet: true
data_dir: data/autoresearch-5m/link

strategy_params:
  instrument: LINK
  equity: 333.0

max_position_qty: 20.0    # ~$170 at ~$8.5 LINK
max_notional_usd: 300
max_order_size: 20.0
max_daily_drawdown_pct: 6.0
max_leverage: 10.0
tvl: 333.0
