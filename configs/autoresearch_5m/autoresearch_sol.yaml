# Native 5m strategy — SOL mainnet ($1K, 3 coins, 10x leverage)
# equity = $333/coin, position = $75-$180 (vote-scaled)
strategy: autoresearch_5m
instrument: SOL-PERP
tick_interval: 15.0
mainnet: true
data_dir: data/autoresearch-5m/sol

strategy_params:
  instrument: SOL
  equity: 333.0

max_position_qty: 2.5     # ~$200 at ~$80 SOL
max_notional_usd: 300
max_order_size: 2.5
max_daily_drawdown_pct: 6.0
max_leverage: 10.0
tvl: 333.0
